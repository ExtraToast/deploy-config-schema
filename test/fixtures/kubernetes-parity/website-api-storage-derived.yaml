apiVersion: v1
kind: PersistentVolume
metadata:
  name: api-storage
spec:
  hostPath:
    path: /srv/blueshell/storage
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - frankfurt-contabo-1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: api-storage
  namespace: default
spec:
  storageClassName: ''
  volumeName: api-storage
