version: 1

cluster:
  name: example
  public_domain: example.test

sites:
  edge:
    kind: vps
    purpose: primary

nodes:
  edge-1:
    status: active
    site: edge
    arch: amd64
    target_roles:
      - k3s-worker
    capacity:
      cpu_millicores: 4000
      memory_mib: 8192
    capabilities:
      - public-ingress

service_intent:
  kubernetes:
    public_apps:
      - web-ui
      - api
      - status
    internal_platform:
      - worker

placement_intent:
  frankfurt_only:
    - web-ui
    - api
  enschede_only:
    - worker
  gpu_specific:
    worker:
      preferred_gpu_model: test-gpu

exposure_intent:
  public:
    - web-ui
    - api
    - status
  internal_only:
    - worker

access_intent:
  sso_protected:
    - api
  host_labels:
    web-ui: root
    api: api
    status: status
  root_redirect:
    status: status-root

ingress_intent:
  kubernetes_backends:
    web-ui:
      namespace: app-system
      service: web-ui
      port: 80
    api:
      namespace: app-system
      service: api
      port: 8080
  route_rules:
    - service: api
      path_prefixes:
        - /api/
      excluded_path_prefixes:
        - /api/internal/
      excluded_paths:
        - /api/health
    - name: api-health
      service: api
      access: direct
      exact_paths:
        - /api/health
      path_prefixes:
        - /api/health/
    - service: web-ui
      excluded_path_prefixes:
        - /api/
  wan_origin_overrides:
    status: edge_direct

monitoring_intent:
  kubernetes_backends:
    worker:
      namespace: workers
      service: worker
      port: 9000
